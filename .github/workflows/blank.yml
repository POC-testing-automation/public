name: Sync to Enterprise

on:
  repository_dispatch:
    types: [sync-repo]
  workflow_dispatch:
    inputs:
      source_repo:
        required: true
        type: string
      source_sha:
        required: true
        type: string
      distinct_id:
        required: true
        type: string

env:
  GHE_HOST: github.com
  GHE_ORG: DEVOPS-ACTIVITIES
  REPO_NAME: testing-codes

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source repo at the triggering commit
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.client_payload.repo || github.event.inputs.source_repo }}
          ref: ${{ github.event.client_payload.sha || github.event.inputs.source_sha }}
          token: ${{ secrets.SOURCE_READ_PAT }}
          fetch-depth: 0
          persist-credentials: false

      - name: Push to Enterprise dev branch (excluding workflow files)
        env:
          GHE_PAT: ${{ secrets.GHE_PAT }}
        run: |
          set -euo pipefail

          GH_USER_LOGIN=$(curl -s -H "Authorization: token ${GHE_PAT}" https://api.github.com/user | jq -r .login)
          GH_USER_ID=$(curl -s -H "Authorization: token ${GHE_PAT}" https://api.github.com/user | jq -r .id)

          git config user.name "${GH_USER_LOGIN}"
          git config user.email "${GH_USER_ID}+${GH_USER_LOGIN}@users.noreply.github.com"

          git remote add enterprise "https://x-access-token:${GHE_PAT}@${GHE_HOST}/${GHE_ORG}/${REPO_NAME}.git"

          git fetch enterprise dev || echo "No existing dev branch on enterprise remote yet — first push."

          git checkout -b sync-temp
          git rm -r --cached .github/workflows || true
          git commit -m "Exclude workflow files from enterprise sync" --allow-empty

          git push enterprise sync-temp:refs/heads/dev --force-with-lease

      - name: Summary
        if: always()
        run: |
          echo "Synced ${{ github.event.client_payload.repo || github.event.inputs.source_repo }} @ ${{ github.event.client_payload.sha || github.event.inputs.source_sha }} to Enterprise (${GHE_ORG}/${REPO_NAME}) dev branch." >> "$GITHUB_STEP_SUMMARY"