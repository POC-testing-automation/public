name: Sync to Enterprise

on:
  repository_dispatch:
    types: [sync-repo]
  workflow_dispatch:
    inputs:
      source_repo:
        required: true
        type: string
      source_sha:
        required: true
        type: string
      distinct_id:
        required: true
        type: string

env:
  GHE_HOST: github.com
  GHE_ORG: DEVOPS-ACTIVITIES
  REPO_NAME: testing-codes

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source repo at the triggering commit
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.client_payload.repo || github.event.inputs.source_repo }}
          ref: ${{ github.event.client_payload.sha || github.event.inputs.source_sha }}
          token: ${{ secrets.SOURCE_READ_PAT }}
          fetch-depth: 0

      - name: Debug - verify GHE_PAT works
        env:
          GHE_PAT: ${{ secrets.GHE_PAT }}
        run: |
          set -euo pipefail
          echo "Token length: ${#GHE_PAT}"
          curl -s -o /dev/null -w "HTTP status: %{http_code}\n" \
            -H "Authorization: Bearer ${GHE_PAT}" \
            "https://api.github.com/repos/${GHE_ORG}/${REPO_NAME}"

      - name: Push to Enterprise dev branch
        env:
          GHE_PAT: ${{ secrets.GHE_PAT }}
        run: |
          set -euo pipefail

          git remote add enterprise "https://${GHE_HOST}/${GHE_ORG}/${REPO_NAME}.git"

          # One-way sync: local checkout (from GitHub Teams) -> Enterprise dev.
          # --force-with-lease guards against clobbering unexpected commits
          # made directly on the Enterprise side.
          git -c http.extraheader="Authorization: token ${GHE_PAT}" \
            push enterprise HEAD:refs/heads/dev --force-with-lease

      - name: Summary
        if: always()
        run: |
          echo "Synced ${{ github.event.client_payload.repo || github.event.inputs.source_repo }} @ ${{ github.event.client_payload.sha || github.event.inputs.source_sha }} to Enterprise (${GHE_ORG}/${REPO_NAME}) dev branch." >> "$GITHUB_STEP_SUMMARY"